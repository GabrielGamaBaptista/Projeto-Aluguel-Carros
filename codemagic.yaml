workflows:
  ios-unsigned:
    name: iOS Unsigned Build (SideStore)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - ios
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Decode GoogleService-Info.plist
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode \
            > ios/BapCar/GoogleService-Info.plist

      - name: Install Node dependencies
        script: |
          npm install

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Build unsigned iOS app
        script: |
          xcodebuild \
            -workspace ios/BapCar.xcworkspace \
            -scheme BapCar \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -quiet

      - name: Package IPA
        script: |
          APP_PATH="build/Build/Products/Release-iphoneos/BapCar.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r BapCar-unsigned.ipa Payload
          rm -rf Payload

    artifacts:
      - BapCar-unsigned.ipa

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
